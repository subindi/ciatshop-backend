<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}"><title>상품 목록</title></head>
<body>
<nav th:replace="~{layout :: nav('items')}"></nav>
<div class="container">
    <div class="card">
        <h2>상품 목록</h2>
        <div class="actions">
            <a href="/view/items/new" class="btn btn-primary">+ 상품 등록</a>
        </div>
        <table>
            <thead>
            <tr>
                <th>상품코드</th><th>상품명</th><th>재고</th><th>원가</th><th>판매가</th><th>구분</th><th>카테고리</th><th>관리</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(items)}">
                <td colspan="8" class="empty">등록된 상품이 없습니다.</td>
            </tr>
            <tr th:each="item : ${items}">
                <td><a th:href="@{/view/items/{cd}(cd=${item.itemCd})}" th:text="${item.itemCd}" style="color:#3498db;text-decoration:none;font-weight:600;"></a></td>
                <td th:text="${item.itemNm}"></td>
                <td th:text="${#numbers.formatInteger(item.itemQnty,1,'COMMA')}"></td>
                <td th:text="${item.unitPrice != null} ? ${#numbers.formatInteger(item.unitPrice,1,'COMMA') + '원'} : '-'"></td>
                <td th:text="${item.sellPrice != null} ? ${#numbers.formatInteger(item.sellPrice,1,'COMMA') + '원'} : '-'"></td>
                <td><span class="badge badge-blue" th:text="${item.itemSeCd}"></span></td>
                <td th:text="${item.itemCateCd}"></td>
                <td style="display:flex;gap:4px;">
                    <a th:href="@{/view/items/{cd}/edit(cd=${item.itemCd})}" class="btn btn-warning" style="padding:4px 10px;font-size:12px;">수정</a>
                    <button class="btn btn-danger" style="padding:4px 10px;font-size:12px;"
                            th:data-item-cd="${item.itemCd}" onclick="deleteItem(this.dataset.itemCd)">삭제</button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<script>
function deleteItem(itemCd) {
    if (!confirm('상품 [' + itemCd + ']을(를) 삭제하시겠습니까?')) return;
    fetch(API_BASE + '/api/v1/items/' + encodeURIComponent(itemCd), { method: 'DELETE' })
        .then(r => r.json())
        .then(data => { if (data.success) location.href = '/view/items'; else alert(data.message); });
}
</script>
</body>
</html>
