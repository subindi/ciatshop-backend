<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}"><title>판매이벤트 등록/수정</title></head>
<body>
<nav th:replace="~{layout :: nav('events')}"></nav>
<div class="container">
    <div class="card" style="max-width:600px;">
        <h2 th:text="${event != null} ? '판매이벤트 수정' : '판매이벤트 등록'"></h2>
        <div class="form-group">
            <label>이벤트명 *</label>
            <input type="text" id="salesEventNm" th:value="${event?.salesEventNm}" placeholder="이벤트명 입력"/>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>시작일 * (YYYYMMDD)</label>
                <input type="text" id="salesEventStrYmd" th:value="${event?.salesEventStrYmd}" placeholder="20240101" maxlength="8"/>
            </div>
            <div class="form-group">
                <label>종료일 * (YYYYMMDD)</label>
                <input type="text" id="salesEventEndYmd" th:value="${event?.salesEventEndYmd}" placeholder="20240131" maxlength="8"/>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>수수료 금액</label>
                <input type="number" id="profitAmt" th:value="${event?.profitAmt}" placeholder="0" min="0"/>
            </div>
            <div class="form-group">
                <label>수수료구분코드</label>
                <input type="text" id="profitSeCd" th:value="${event?.profitSeCd}" placeholder="예: RATE"/>
            </div>
        </div>
        <div class="form-group">
            <label>부가세여부</label>
            <select id="profitVatYn">
                <option value="">-- 선택 --</option>
                <option value="Y" th:selected="${event?.profitVatYn == 'Y'}">Y</option>
                <option value="N" th:selected="${event?.profitVatYn == 'N'}">N</option>
            </select>
        </div>
        <div id="errMsg" class="alert alert-error" style="display:none;"></div>
        <div class="actions" style="margin-top:8px;">
            <a href="/view/sales-events" class="btn btn-secondary">취소</a>
            <button class="btn btn-primary" onclick="save()">저장</button>
        </div>
    </div>
</div>
<script th:inline="javascript">
    const isEdit = /*[[${event != null}]]*/ false;
    const eventSeq = /*[[${event?.salesEventSeq}]]*/ null;

    function save() {
        const body = {
            salesEventNm:     document.getElementById('salesEventNm').value.trim(),
            salesEventStrYmd: document.getElementById('salesEventStrYmd').value.trim(),
            salesEventEndYmd: document.getElementById('salesEventEndYmd').value.trim(),
            profitAmt:        Number(document.getElementById('profitAmt').value) || 0,
            profitSeCd:       document.getElementById('profitSeCd').value.trim() || null,
            profitVatYn:      document.getElementById('profitVatYn').value || null
        };
        if (!body.salesEventNm) { showErr('이벤트명은 필수입니다.'); return; }
        if (!/^\d{8}$/.test(body.salesEventStrYmd) || !/^\d{8}$/.test(body.salesEventEndYmd)) {
            showErr('시작일/종료일은 8자리 숫자 형식이어야 합니다. (예: 20240101)'); return;
        }
        const url    = isEdit ? API_BASE + '/api/v1/sales-events/' + eventSeq : API_BASE + '/api/v1/sales-events';
        const method = isEdit ? 'PUT' : 'POST';
        fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })
            .then(r => r.json())
            .then(data => {
                if (data.success) location.href = '/view/sales-events/' + data.data.salesEventSeq;
                else showErr(data.message);
            });
    }
    function showErr(msg) {
        const el = document.getElementById('errMsg');
        el.textContent = msg; el.style.display = 'block';
    }
</script>
</body>
</html>
