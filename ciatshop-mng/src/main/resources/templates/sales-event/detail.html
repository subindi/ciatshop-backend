<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}"><title>판매이벤트 상세</title></head>
<body>
<nav th:replace="~{layout :: nav('events')}"></nav>
<div class="container">
    <div class="card">
        <h2>판매이벤트 상세</h2>
        <div class="detail-grid">
            <div class="dl">이벤트 순번</div>  <div class="dl" th:text="${event.salesEventSeq}"></div>
            <div class="dl">이벤트명</div>     <div class="dl" th:text="${event.salesEventNm}"></div>
            <div class="dl">시작일</div>       <div class="dl" th:text="${event.salesEventStrYmd}"></div>
            <div class="dl">종료일</div>       <div class="dl" th:text="${event.salesEventEndYmd}"></div>
            <div class="dl">수수료</div>       <div class="dl" th:text="${event.profitAmt != null} ? ${#numbers.formatInteger(event.profitAmt,1,'COMMA') + '원'} : '-'"></div>
            <div class="dl">수수료구분</div>   <div class="dl" th:text="${event.profitSeCd}"></div>
            <div class="dl">부가세여부</div>   <div class="dl" th:text="${event.profitVatYn}"></div>
        </div>
        <div class="actions" style="margin-top:20px;">
            <a href="/view/sales-events" class="btn btn-secondary">목록</a>
            <a th:href="@{/view/sales-events/{seq}/edit(seq=${event.salesEventSeq})}" class="btn btn-warning">수정</a>
            <button class="btn btn-danger" th:data-seq="${event.salesEventSeq}" onclick="deleteEvent(this.dataset.seq)">삭제</button>
        </div>
    </div>
</div>
<script>
function deleteEvent(seq) {
    if (!confirm('이벤트를 삭제하시겠습니까?')) return;
    fetch(API_BASE + '/api/v1/sales-events/' + seq, { method: 'DELETE' })
        .then(r => r.json())
        .then(data => { if (data.success) location.href = '/view/sales-events'; else alert(data.message); });
}
</script>
</body>
</html>
